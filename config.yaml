# Przykładowa konfiguracja benchmarku.
# Ścieżki są względne względem katalogu głównego repozytorium.

image_paths:
  - data/input/clic-dataset/val2017/test/aaron-greenwood-x9zy_1oHjqw-unsplash.png
  - data/input/clic-dataset/val2017/test/abhas-mishra-BD3qGeorAFY-unsplash.png

encoder_configs:
  - codec: hevc
    mode: full_image
    preset: medium
    extra_params:
      lossless: 1
  - codec: vvc
    mode: inter
    preset: medium
    extra_params:
      lossless: 1

tiling_configs:
  - tile_width: 64
    tile_height: 64
    curve: raster
    padding_mode: constant
  - tile_width: 64
    tile_height: 64
    curve: hilbert
    padding_mode: constant
  - tile_width: 64
    tile_height: 64
    curve: z_order
    padding_mode: constant

output_dir: results/benchmark
